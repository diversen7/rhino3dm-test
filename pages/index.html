<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Epicycles</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3efe7;
      --panel: rgba(255, 255, 255, 0.78);
      --text: #1d2421;
      --muted: #5b625f;
      --shadow: rgba(29, 36, 33, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(180, 209, 197, 0.8), transparent 38%),
        linear-gradient(180deg, #f8f4ec 0%, var(--bg) 100%);
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      padding: 1rem 1.25rem 0;
    }

    .panel {
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      padding: 1rem 1.25rem 1.25rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(29, 36, 33, 0.08);
      border-radius: 18px;
      box-shadow: 0 18px 40px var(--shadow);
      backdrop-filter: blur(14px);
      overflow: hidden;
    }

    .meta {
      padding: 1rem 1.25rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      line-height: 1.1;
    }

    p {
      margin: 0.5rem 0 0;
      color: var(--muted);
    }

    model-viewer {
      width: 100%;
      height: min(78vh, 900px);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.92), rgba(233, 227, 217, 0.85)),
        linear-gradient(180deg, #fefcf9 0%, #ece4d7 100%);
    }
  </style>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
</head>
<body>
  <header class="panel">
    <div class="card meta">
      <h1>Epicycles</h1>
      <p>Drag to orbit. Scroll to zoom. Shift-drag to pan.</p>
    </div>
  </header>
  <main class="panel">
    <div class="card">
      <model-viewer
        src="Epicycles.glb"
        alt="Epicycles"
        camera-controls
        touch-action="pan-y"
        shadow-intensity="1"
        exposure="1">
      </model-viewer>
    </div>
  </main>
  <script>
    if (window.location.protocol === "file:") {
      console.warn(
        "This viewer must be opened over http:// or https://. Browsers block model fetches from file:// for CORS reasons."
      );
    }
  </script>
</body>
</html>
